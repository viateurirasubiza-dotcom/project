<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Report System</title>

<style>
/* FUTURISTIC LIVE NEON LOGIN */

body{
font-family:Arial;
background:#050510;
margin:0;
padding:20px;
overflow-x:hidden;
position:relative;
min-height:100vh;
color:white;
}
.school-logo{
width:100px;
height:100px;
object-fit:contain;
margin-bottom:15px;
filter:drop-shadow(0 0 15px #00ffff);
animation:logoGlow 2s infinite alternate;
}

@keyframes logoGlow{
from{
transform:scale(1);
filter:drop-shadow(0 0 10px #00ffff);
}
to{
transform:scale(1.05);
filter:drop-shadow(0 0 25px #ff00ff);
}
}

/* LIVE PARTICLES */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background:
radial-gradient(circle,#00ffff88 2px,transparent 3px),
radial-gradient(circle,#ff00ff88 2px,transparent 3px),
radial-gradient(circle,#00ff8888 2px,transparent 3px);
background-size:120px 120px;
animation:particlesMove 25s linear infinite;
z-index:-2;
opacity:0.5;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(120deg,#000000ee,#050520ee,#000000ee);
z-index:-3;
}

/* PARTICLES ANIMATION */
@keyframes particlesMove{
0%{
transform:translate(0,0);
}
100%{
transform:translate(-300px,-300px);
}
}

/* LOGIN BOX */
.login-box{
max-width:420px;
margin:80px auto;
padding:35px;
border-radius:20px;
background:rgba(10,10,30,0.75);
backdrop-filter:blur(12px);
border:1px solid #00ffff55;
box-shadow:
0 0 15px #00ffff88,
0 0 35px #00ffff55,
0 0 60px #ff00ff33;
text-align:center;
position:relative;
overflow:hidden;
}

/* NEON BORDER EFFECT */
.login-box::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:conic-gradient(
from 0deg,
transparent,
#00ffff,
transparent,
#ff00ff,
transparent
);
animation:rotateBorder 6s linear infinite;
z-index:-1;
}

.login-box::after{
content:"";
position:absolute;
inset:3px;
background:rgba(5,5,20,0.95);
border-radius:18px;
z-index:-1;
}

@keyframes rotateBorder{
100%{
transform:rotate(360deg);
}
}

/* TITLE */
.login-box h2{
font-size:28px;
margin-bottom:25px;
color:#00ffff;
text-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
letter-spacing:2px;
}

/* INPUTS */
.login-box input{
width:90%;
padding:14px;
margin:10px 0;
border:none;
outline:none;
border-radius:10px;
background:#0d0d25;
color:white;
font-size:15px;
box-shadow:
inset 0 0 10px #00ffff33,
0 0 8px #00ffff44;
transition:0.3s;
}

.login-box input:focus{
transform:scale(1.03);
box-shadow:
0 0 15px #00ffff,
0 0 30px #00ffff88;
}

/* BUTTON */
.login-box button{
width:95%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:
0 0 15px #00ffff88,
0 0 25px #ff00ff55;
}

.login-box button:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:
0 0 20px #00ffff,
0 0 40px #ff00ff;
}

/* MAIN CONTAINER */
.container{
max-width:1200px;
margin:auto;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:10px;
color:black;
}

/* MOBILE */
@media(max-width:600px){

.login-box{
margin-top:40px;
padding:25px;
}

.login-box h2{
font-size:22px;
}

}
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input,select,button{
padding:7px;
margin:4px;
}

button{
cursor:pointer;
}

.report{
border:3px solid #000;
padding:15px;
margin-top:20px;
background:white;
}

.header-top{
text-align:center;
font-size:20px;
font-weight:bold;
color:green;
}

.sub-header{
text-align:center;
font-size:12px;
margin-bottom:10px;
}

.line-input{
display:flex;
justify-content:space-between;
gap:10px;
margin:6px 0;
font-size:13px;
font-weight:bold;
}

.line-input span{

padding-left:5px;
}

.term-title{
margin-top:10px;
background:#eee;
padding:6px;

border-left:5px solid green;
}

.table-report{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:11px;
}

.table-report th,.table-report td{
border:1px solid #000;
padding:4px;
text-align:center;

}

.subject-col{
text-align:left;
padding-left:6px;
}

.action-btn{
padding:5px 10px;
border:none;
color:white;
}

.view-btn{
background:green;
}

.delete-btn{
background:red;
}

.login-box{
max-width:400px;
margin:80px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.logout-btn{
background:red;
color:white;
border:none;
padding:8px 15px;
float:right;
}

@media print{
body *{
visibility:hidden;
}

#report,#report *{
visibility:visible;
}

#report{
position:absolute;
left:0;
top:0;
width:100%;
background:white;
}

button{
display:none !important;
}

.table-report{
font-size:10px;
}

@page{
size:A4 landscape;
margin:10mm;
}
}
.upload-btn{
display:inline-block;
padding:10px 18px;
background:linear-gradient(90deg,#00ffff,#ff00ff);
color:white;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
font-weight:bold;
box-shadow:0 0 15px #00ffff88;
transition:0.3s;
}

.upload-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px #ff00ff;
}

.school-logo{
width:120px;
height:120px;
object-fit:contain;
display:block;
margin:0 auto 15px auto;
border-radius:50%;
border:3px solid #00ffff;
filter:drop-shadow(0 0 15px #00ffff);
animation:logoGlow 2s infinite alternate;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<select id="subjectSelect">

<option value="">Select Subject</option>

<option value="MATHEMATICS">MATHEMATICS</option>

<option value="ENGLISH">ENGLISH</option>

<option value="IKINYARWANDA">IKINYARWANDA</option>

<input type="text" id="username" placeholder="Username"><br>

<b></b>  <br>

<!-- TEACHER SYSTEM -->
<div id="teacherSystem" style="display:none;">

<div class="container">

<select id="class" onchange="filterTeacherSubject()">

<option>S6</option>

Add Student
</button>

<select id="viewClass" onchange="loadClassStudents()">

<option>P3</option>
<option>P4</option>
<option>P5</option>
<option>P6</option>

<option>S2</option>
<option>S3</option>
<option>S4</option>
<option>S5</option>
<option>S6</option>

</select>

<table border="1" width="100%" style="margin-top:10px;">
<tr>
<th>#</th>

<tr>
<th>Name</th>
<th>Class</th>

<th>Term</th>
<th>Action</th>
</tr>

<script>

/* LOGIN SYSTEM */

function login(){

let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;

let subject=document.getElementById("subjectSelect").value;

/* SUBJECT PASSWORDS */

const subjectPasswords = {

"MATHEMATICS":"math123",

"ENGLISH":"eng123",

"IKINYARWANDA":"kinya123",

"SCIENCE":"sci123",

"SOCIAL STUDIES":"social123",

"FRENCH":"french123",

"P.E":"pe123",

"C.A":"ca123"

};

/* TEACHER LOGIN */

if(user==="teacher"){

if(subjectPasswords[subject]===pass){

localStorage.setItem("role","teacher");

localStorage.setItem("teacherSubject",subject);

document.getElementById("loginPage").style.display="none";

document.getElementById("teacherSystem").style.display="block";

document.getElementById("hodSystem").style.display="none";

/* SHOW ONLY TEACHER SUBJECT */

filterTeacherSubject();

}

else{

alert("Wrong Subject Password");

}

}

/* HOD LOGIN */

else if(user==="hod" && pass==="1234"){

localStorage.setItem("role","hod");

document.getElementById("loginPage").style.display="none";

document.getElementById("teacherSystem").style.display="none";

document.getElementById("hodSystem").style.display="block";

load();

}

else{

alert("Wrong Login");

}

}

function checkLogin(){

let role = localStorage.getItem("role");

if(role==="teacher"){

document.getElementById("loginPage").style.display="none";

document.getElementById("teacherSystem").style.display="block";

document.getElementById("hodSystem").style.display="none";

}

else if(role==="hod"){

document.getElementById("loginPage").style.display="none";

document.getElementById("teacherSystem").style.display="none";

document.getElementById("hodSystem").style.display="block";

load();

}

else{

document.getElementById("loginPage").style.display="block";

document.getElementById("teacherSystem").style.display="none";

document.getElementById("hodSystem").style.display="none";

}
}
let classStudents = JSON.parse(
localStorage.getItem("classStudents")
|| "{}"
);
if(Object.keys(classStudents).length===0){

classStudents = {

"P1":["Alice","Eric","John"],
"P2":["Kevin","Mugisha","Aline"],
"P3":["David","Joy"],
"P4":["Patrick","Grace"],
"P5":["Claude","Brian"],
"P6":["Keza","Meddy"],

"S1":["Yvan","Olive"],
"S2":["Munezero","Ariella"],
"S3":["Jordan","Lionel"],
"S4":["Queen","Prince"],
"S5":["Diane","Chris"],
"S6":["Pacifique","Hope"]

};

localStorage.setItem(
"classStudents",
JSON.stringify(classStudents)
);

}
/* LOAD STUDENTS BY CLASS */

function loadClassStudents(){

let cls = document.getElementById("viewClass").value;

let tbody = document.getElementById("classStudentsList");

tbody.innerHTML = "";

if(!cls || !classStudents[cls]){
return;
}

classStudents[cls].forEach((student,index)=>{

tbody.innerHTML += `

<tr>

<td>${index + 1}</td>

<td>${student}</td>

<td>

<button
style="background:red;color:white;border:none;padding:5px 10px;"
onclick="deleteClassStudent('${cls}','${student}')"
>

Delete

</button>

</td>

</tr>

`;

});

}

/* DELETE STUDENT FROM CLASS */

function deleteClassStudent(cls,student){

if(!confirm("Delete " + student + " from " + cls + "?")){
return;
}

classStudents[cls] = classStudents[cls].filter(
s => s !== student
);

/* SAVE */

localStorage.setItem(
"classStudents",
JSON.stringify(classStudents)
);

/* ALSO DELETE REPORTS/MARKS */

let students = JSON.parse(
localStorage.getItem("students") || "[]"
);

students = students.filter(
s => !(s.name === student && s.class === cls)
);

localStorage.setItem(
"students",
JSON.stringify(students)
);

/* REFRESH */

loadClassStudents();
load();

alert(student + " deleted successfully");

}
function addStudentToClass(){

let name = document.getElementById("newStudentName").value.trim();

let cls = document.getElementById("newStudentClass").value;

if(name==="" || cls===""){
alert("Enter student and class");
return;
}

if(!classStudents[cls]){
classStudents[cls]=[];
}

if(classStudents[cls].includes(name)){
alert("Student already exists");
return;
}

classStudents[cls].push(name);

localStorage.setItem(
"classStudents",
JSON.stringify(classStudents)
);

document.getElementById("newStudentName").value="";
document.getElementById("newStudentClass").value="";

alert("Student Added ");

}
function loadStudentsByClass(){

let cls = document.getElementById("class").value;

let select = document.getElementById("studentSelect");

select.innerHTML = `<option value="">Select Student</option>`;

if(classStudents[cls]){

classStudents[cls].forEach(student=>{

select.innerHTML += `
<option value="${student}">
${student}
</option>
`;

});

}

}
function logout(){

localStorage.removeItem("role");

location.reload();

}

/* REPORT SYSTEM */

const subjects=[
"MATHEMATICS",
"ENGLISH",
"IKINYARWANDA",
"SCIENCE",
"SOCIAL STUDIES",
"FRENCH",
"P.E",
"C.A"
];
function filterTeacherSubject(){

let teacherSubject = localStorage.getItem("teacherSubject");

let cls = document.getElementById("class").value;

let students = classStudents[cls] || [];

let html = "";

if(cls === ""){

document.getElementById("marks").innerHTML = "";

return;

}

let limit =
(teacherSubject === "P.E" || teacherSubject === "C.A")
? 10 : 50;

students.forEach((student,index)=>{

html += `

<div style="
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ccc;
color:black;
">

<h3>${student}</h3>

<label>Mid/${limit}</label>

<input
type="number"
id="mid_${index}"
min="0"
max="${limit}"
style="width:80px;"
>

<label>Exam/${limit}</label>

<input
type="number"
id="exam_${index}"
min="0"
max="${limit}"
style="width:80px;"
>

</div>

`;

});

document.getElementById("marks").innerHTML = html;

}

function remark(avg){

if(avg>=80) return "Excellent";
if(avg>=70) return "Very Good";
if(avg>=60) return "Good";
if(avg>=50) return "Pass";

return "Fail";
}

function saveAllStudents(){

let cls = document.getElementById("class").value;

let term = document.getElementById("term").value;

let teacherSubject =
localStorage.getItem("teacherSubject");

if(cls === ""){

alert("Select Class");

return;

}

let students =
classStudents[cls] || [];

let studentsData =
JSON.parse(localStorage.getItem("students") || "[]");

let limit =
(teacherSubject === "P.E" || teacherSubject === "C.A")
? 10 : 50;

students.forEach((student,index)=>{

let mid =
parseInt(document.getElementById(`mid_${index}`).value) || 0;

let exam =
parseInt(document.getElementById(`exam_${index}`).value) || 0;

if(mid > limit || exam > limit){

alert(student + " exceeds limit");

return;

}

let existing = studentsData.find(s =>

s.name === student &&
s.class === cls &&
s.term === term

);

if(!existing){

existing = {

id: Date.now() + Math.random(),

name: student,

class: cls,

sdms: "",

term: term,

marks: {}

};

studentsData.push(existing);

}

existing.marks[teacherSubject] = {

mid: mid,

exam: exam

};

});

localStorage.setItem(
"students",
JSON.stringify(studentsData)
);

alert("All Marks Saved Successfully");

load();

}
function load(){

let students=JSON.parse(localStorage.getItem("students")||"[]");

let html="";

students.forEach(s=>{

html+=`
<tr>

<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.sdms||"-"}</td>
<td>${s.term}</td>

<td>
<button class="action-btn view-btn" onclick="view(${s.id})">View</button>

<button class="action-btn delete-btn" onclick="deleteStudent(${s.id})">Delete</button>
</td>

</tr>
`;

});

document.getElementById("list").innerHTML=html;
}
function render(){
  load();
  filterTeacherSubject();
}

function deleteStudent(id){

let students=JSON.parse(localStorage.getItem("students")||"[]");

students=students.filter(x=>x.id!=id);

localStorage.setItem("students",JSON.stringify(students));

load();

document.getElementById("report").innerHTML="";
}

function clearAll(){

if(confirm("Delete all students?")){

localStorage.removeItem("students");

load();

document.getElementById("report").innerHTML="";
}
}

function total(rec){

let t=0;

subjects.forEach(sub=>{

let m = rec.marks[sub] || {mid:0,exam:0};

t += (m.mid||0) + (m.exam||0);

});

return t;
}

function rank(students,cls,terms){

let filtered=students.filter(x=>x.class===cls);

let map={};

filtered.forEach(s=>{

let key=s.sdms||s.name;

if(!map[key]) map[key]={student:s,total:0};

if(terms.includes(s.term)) map[key].total+=total(s);

});

let arr=Object.values(map);

let max=subjects.length*100*terms.length;

arr.forEach(x=>{

x.percent=Math.round((x.total/max)*100);

});

arr.sort((a,b)=>b.percent-a.percent);

return arr;
}

function buildTable(all,terms){

let isAnnual=terms.length===3;

let html=`<table class="table-report"><tr><th>SUBJECT</th>`;

terms.forEach(t=>html+=`<th colspan="5">${t}</th>`);

if(isAnnual) html+=`<th colspan="2">ANNUAL TERMS AVG</th>`;

html+=`</tr><tr><th></th>`;

terms.forEach(()=>html+=`<th>MID</th><th>EXAM</th><th>TOTAL</th><th>AVG %</th><th>REMARK</th>`);

if(isAnnual) html+=`<th>AVG %</th><th>REMARK</th>`;

html+=`</tr>`;

let grand={};

terms.forEach(t=>grand[t]=0);

subjects.forEach(sub=>{

html+=`<tr><td class="subject-col">${sub}</td>`;

let annualSum=0,annualCount=0;

terms.forEach(t=>{

let r=all.find(x=>x.term===t);

if(r){

let m = r.marks[sub] || {mid:0,exam:0};

let max=(sub==="P.E"||sub==="C.A")?20:100;

let totalScore=(m.mid||0)+(m.exam||0);

let avg=Math.round((totalScore/max)*100);

grand[t]+=avg;

annualSum+=avg;

annualCount++;

html+=`
<td>${m.mid}</td>
<td>${m.exam}</td>
<td>${totalScore}</td>
<td>${avg}%</td>
<td>${remark(avg)}</td>
`;

}else{

html+=`<td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>`;
}

});

if(isAnnual){

let annAvg=Math.round(annualSum/annualCount);

html+=`
<td>${annAvg}%</td>
<td>${remark(annAvg)}</td>
`;
}

html+=`</tr>`;
});

html+=`<tr><td><b>TOTAL AVG</b></td>`;

terms.forEach(t=>{

let avg=Math.round(grand[t]/subjects.length);

if(avg>100) avg=100;

html+=`
<td colspan="4">${avg}%</td>
<td>${remark(avg)}</td>
`;

});

if(isAnnual){

let annTotal=0;

for(let t of terms){
annTotal+=Math.round(grand[t]/subjects.length);
}

let annAvg=Math.round(annTotal/terms.length);

if(annAvg>100) annAvg=100;

html+=`
<td>${annAvg}%</td>
<td>${remark(annAvg)}</td>
`;
}

html+=`</tr>`;

html+=`</table>`;

return html;
}

function view(id){

let students=JSON.parse(localStorage.getItem("students")||"[]");

let s=students.find(x=>x.id==id);

if(!s)return;

let all=students.filter(x=>
x.name===s.name &&
x.class===s.class &&
(x.sdms===s.sdms)
);

let terms=[];

/* LOGO UPLOAD */

document.addEventListener("DOMContentLoaded", () => {

  const logoUpload = document.getElementById("logoUpload");
  const schoolLogo = document.getElementById("schoolLogo");

  if (!logoUpload || !schoolLogo) return;

  // LOAD SAVED LOGO
  const savedLogo = localStorage.getItem("schoolLogo");

  if (savedLogo) {
    schoolLogo.src = savedLogo;
    schoolLogo.style.display = "block";
  }

  // UPLOAD LOGO
  logoUpload.addEventListener("change", function () {

    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
      schoolLogo.src = e.target.result;
      schoolLogo.style.display = "block";

      localStorage.setItem("schoolLogo", e.target.result);
    };

    reader.readAsDataURL(file);
  });

});
</script>
